<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korea ETS Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js" integrity="sha384-Hl48Kq2HifOWdXEjMsKo6qxqvRLTYqIGbvlENBmkHAxZKIGCXv43H6W1jA671RzC" crossorigin="anonymous"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #0f1923; color: #e0e0e0; }
.header { text-align: center; padding: 24px 20px; background: linear-gradient(135deg, #1a2332, #2d3748); position: relative; }
.header h1 { font-size: 1.8em; color: #63b3ed; margin-bottom: 6px; }
.header p { color: #a0aec0; font-size: 0.9em; }
.lang-switcher { position: absolute; top: 20px; right: 24px; }
.lang-switcher select {
  background: #2d3748; color: #e0e0e0; border: 1px solid #4a5568; border-radius: 6px;
  padding: 6px 12px; font-size: 0.85em; cursor: pointer; outline: none;
}
.lang-switcher select:hover { border-color: #63b3ed; }
.cards { display: flex; gap: 15px; padding: 20px; flex-wrap: wrap; justify-content: center; }
.card { background: #1a2332; border-radius: 10px; padding: 20px 24px; min-width: 200px; text-align: center; border: 1px solid #2d3748; flex: 1; max-width: 280px; }
.card .value { font-size: 1.8em; color: #48bb78; font-weight: bold; line-height: 1.3; }
.card .label { color: #a0aec0; font-size: 0.85em; margin-top: 6px; }
.card .sub { color: #718096; font-size: 0.75em; margin-top: 4px; }
.chart-container { padding: 10px 20px; max-width: 1400px; margin: 0 auto; }
.chart { background: #1a2332; border-radius: 10px; margin-bottom: 20px; padding: 15px; border: 1px solid #2d3748; min-height: 420px; }
.footer { text-align: center; padding: 20px; color: #718096; font-size: 0.85em; border-top: 1px solid #2d3748; margin-top: 10px; }
.phase-tag { display: inline-block; background: #2d3748; color: #63b3ed; padding: 2px 8px; border-radius: 4px; font-size: 0.7em; margin-left: 4px; }
/* Price filter bar */
.pf-bar { padding: 6px 10px 2px; }
.pf-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-bottom: 3px; }
.pf-sep { width: 1px; height: 16px; background: #4a5568; margin: 0 3px; flex-shrink: 0; }
.pf-btn {
  display: inline-flex; align-items: center; gap: 2px;
  padding: 2px 7px; border-radius: 3px; font-size: 0.72em;
  cursor: pointer; border: 1px solid #4a5568; background: transparent;
  color: #718096; transition: all 0.12s; user-select: none; line-height: 1.5;
}
.pf-btn:hover { border-color: #a0aec0; color: #e0e0e0; }
.pf-ctrl { font-weight: 600; background: #2d3748; }
.pf-ctrl:hover { background: #4a5568; }
.pf-grp { font-weight: 600; }
.pf-grp .arrow { font-size: 0.7em; transition: transform 0.15s; display: inline-block; }
.pf-grp.expanded .arrow { transform: rotate(90deg); }
.pf-grp.g-on { color: #fff; border-color: var(--c); background: var(--c); }
.pf-grp.g-partial { color: var(--c); border-color: var(--c); border-style: dashed; }
.pf-sub { display: none; gap: 3px; align-items: center; flex-wrap: wrap; padding: 1px 0; }
.pf-sub.open { display: flex; }
.pf-sub .pf-sub-ctl { font-size: 0.62em; color: #718096; cursor: pointer; padding: 1px 4px; border-radius: 2px; }
.pf-sub .pf-sub-ctl:hover { color: #e0e0e0; background: #2d3748; }
.pf-type {
  padding: 1px 5px; font-size: 0.65em; min-width: 18px; text-align: center;
  border-radius: 2px; cursor: pointer; border: 1px solid #4a5568;
  color: #718096; transition: all 0.12s; user-select: none;
}
.pf-type:hover { border-color: #a0aec0; color: #e0e0e0; }
.pf-type.on { color: #fff; border-color: var(--c); background: var(--c); }
</style>
</head>
<body>
<div class="header">
  <h1 id="main-title">K-ETS Carbon Market Dashboard</h1>
  <p id="sub-title"></p>
  <div class="lang-switcher">
    <select id="lang-select" onchange="switchLang(this.value)">
      <option value="en">English</option>
      <option value="ko" selected>한국어</option>
      <option value="ja">日本語</option>
      <option value="cn">中文</option>
    </select>
  </div>
</div>

<div class="cards" id="summary-cards"></div>
<div class="chart-container">
  <div class="chart">
    <div class="pf-bar" id="price-filter-bar"></div>
    <div id="kau-price-chart"></div>
  </div>
  <div class="chart" id="kau-candlestick-chart"></div>
  <div class="chart" id="monthly-volume-chart"></div>
  <div class="chart" id="monthly-heatmap"></div>
  <div class="chart" id="auction-chart"></div>
</div>
<div class="footer" id="footer-text">
  <div style="margin-bottom:12px;">
    <strong id="ds-title"></strong><br>
    <span id="ds-krx"></span><br>
    <span id="ds-env"></span><br>
    <span id="ds-disclaimer" style="color:#e53e3e;font-size:0.8em;"></span>
  </div>
  korea-ets-mcp | JIN-Z-pop and his merry AI brothers | Plotly.js
</div>

    priceRange: 'KAU 价格范围',
    auctionCount: '拍卖次数',
    tradingDaysUnit: '日',
    avg: '均价',
    times: '次',
    kauPriceTrend: 'KAU/KCU/KOC 收盘价走势',
    kauCandlestick: 'KAU K线图 + 成交量',
    monthlyVolume: '月度KAU交易量与交易额',
    monthlyHeatmap: '月度交易量热图',
    auctionResults: '拍卖结果（中标价与中标量）',

    dataSource: '数据来源',
    krxSource: 'KRX（韩国交易所）排放权市场',
    envSource: '环境部 / 温室气体综合信息中心（GIR）',
    disclaimer: '本仪表盘仅供研究参考，数据准确性不做保证。',

    otcVol: '场外交易量',
    auctionVol: '拍卖量',
    exchangeAmt: '场内交易额',
    filterAll: '全选', filterNone: '全取消', filterReset: '重置',
    filterGrpAll: '全选', filterGrpNone: '取消',
  },
};

let currentLang = 'ko';

// === Data (Jinja2 injected) ===
const rawDailyData = {{ daily_data_json }};
const rawOhlcvData = {{ ohlcv_data_json }};
const rawMonthlyData = {{ monthly_data_json }};
const rawAuctionData = {{ auction_data_json }};
const summary = {{ summary_json }};

// Group daily data by permit type
function groupBy(data, key) {
  const groups = {};
  data.forEach(d => {
    const k = d[key];
    if (!groups[k]) groups[k] = [];
    groups[k].push(d);
  });
  return groups;
}

const dailyByType = groupBy(rawDailyData, 'permit_type');
const ohlcvByType = groupBy(rawOhlcvData, 'kau_type');

const darkLayout = {
  paper_bgcolor: '#1a2332', plot_bgcolor: '#1a2332',
  font: { color: '#e0e0e0', family: 'Segoe UI, sans-serif' },
  xaxis: { gridcolor: '#2d3748', linecolor: '#2d3748' },
  yaxis: { gridcolor: '#2d3748', linecolor: '#2d3748' },
  margin: { t: 60, b: 50, l: 70, r: 30 },
};

const plotlyConfig = {
  responsive: true,
  displaylogo: false,
  modeBarButtonsToRemove: ['lasso2d', 'select2d'],
};

function fmt(n, dec) {
  if (n == null || n === 0) return 'N/A';
  return dec != null ? n.toFixed(dec).replace(/\B(?=(\d{3})+(?!\d))/g, ',') : n.toLocaleString();
}

// === Render Cards ===
function renderCards(lang) {
  const t = i18n[lang];
  const cardsDiv = document.getElementById('summary-cards');
  cardsDiv.innerHTML = '';
  const dp = summary.daily_price || {};
  const lp = (summary.latest_prices || []);
  const latestKAU = lp.find(p => p.permit_type && p.permit_type.startsWith('KAU'));

  const cardDefs = [
    {
      value: latestKAU ? `₩${fmt(latestKAU.closing_price)}` : 'N/A',
      label: t.kauLatestPrice,
      sub: latestKAU ? `${latestKAU.permit_type} (${latestKAU.date})` : '',
    },
    {
      value: dp.total_trading_days || 0,
      label: t.tradingDays,
      sub: dp.first_date && dp.last_date ? `${dp.first_date} ~ ${dp.last_date}` : '',
    },
    {
      value: dp.min_price && dp.max_price ? `₩${fmt(dp.min_price)} - ₩${fmt(dp.max_price)}` : 'N/A',
      label: t.priceRange,
      sub: dp.avg_price ? `${t.avg}: ₩${fmt(dp.avg_price)}` : '',
    },
    {
      value: (summary.auction || {}).auction_count || 0,
      label: t.auctionCount,
      sub: `${((summary.auction || {}).first_auction) || ''} ~ ${((summary.auction || {}).last_auction) || ''}`,
    },
  ];

  cardDefs.forEach(c => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<div class="value">${c.value}</div><div class="label">${c.label}</div>${c.sub ? '<div class="sub">' + c.sub + '</div>' : ''}`;
    cardsDiv.appendChild(div);
  });
}

// === Charts ===
let chartsInitialized = false;

// Color palette for permit types
const typeColors = {
  'KAU15': '#63b3ed', 'KAU16': '#63b3ed', 'KAU17': '#63b3ed',
  'KAU18': '#48bb78', 'KAU19': '#48bb78', 'KAU20': '#48bb78',
  'KAU21': '#ed8936', 'KAU22': '#ed8936', 'KAU23': '#ed8936',
  'KAU24': '#fc8181', 'KAU25': '#fc8181',
  'KCU': '#9f7aea', 'KCU23': '#9f7aea', 'KCU24': '#9f7aea',
  'KOC': '#f6e05e',
};
function getColor(type) {
  if (typeColors[type]) return typeColors[type];
  if (type.startsWith('KCU')) return '#9f7aea';
  if (type.startsWith('KOC')) return '#f6e05e';
  if (type.startsWith('KAU')) return '#63b3ed';
  return '#a0aec0';
}

function initCharts(lang) {
  const t = i18n[lang];

  // 1. KAU/KCU/KOC Closing Price Trend (multi-line) with filter bar
  const mainTypes = Object.keys(dailyByType).sort();
  const showTypes = mainTypes.filter(tp => dailyByType[tp] && dailyByType[tp].length > 30);
  if (showTypes.length > 0) {
    const traces = showTypes.map(tp => ({
      x: dailyByType[tp].map(d => d.date),
      y: dailyByType[tp].map(d => d.closing_price),
      type: 'scatter', mode: 'lines',
      line: { color: getColor(tp), width: 1.5 },
      name: tp,
      hovertemplate: `${tp}<br>%{x}<br>₩%{y:,.0f}/ton<extra></extra>`,
    }));
    Plotly.newPlot('kau-price-chart', traces, {
      ...darkLayout,
      title: { text: t.kauPriceTrend, font: { color: '#63b3ed', size: 16 } },
      xaxis: { ...darkLayout.xaxis, rangeslider: { visible: true, bgcolor: '#1a2332' } },
      yaxis: { ...darkLayout.yaxis, title: { text: t.priceUnit, standoff: 10 } },
      height: 500,
      showlegend: false,
    }, plotlyConfig);
    buildPriceFilter(showTypes, t);
  }

  // 2. KAU Candlestick + Volume (latest KAU type that has actual trading data)
  const ohlcvTypes = Object.keys(ohlcvByType).sort();
  const mainOhlcv = ohlcvTypes.filter(tp =>
    ohlcvByType[tp].some(d => d.open_price > 0)
  ).pop() || null;
  if (mainOhlcv && ohlcvByType[mainOhlcv].length > 0) {
    const oData = ohlcvByType[mainOhlcv].filter(d => d.open_price > 0);
    if (oData.length > 0) {
      const ohlcDates = oData.map(d => d.date);
      Plotly.newPlot('kau-candlestick-chart', [{
        x: ohlcDates,
        open: oData.map(d => d.open_price),
        high: oData.map(d => d.high_price),
        low: oData.map(d => d.low_price),
        close: oData.map(d => d.close_price),
        type: 'candlestick', name: mainOhlcv,
        increasing: { line: { color: '#fc8181' }, fillcolor: 'rgba(252,129,129,0.3)' },
        decreasing: { line: { color: '#63b3ed' }, fillcolor: 'rgba(99,179,237,0.3)' },
      }, {
        x: ohlcDates,
        y: oData.map(d => d.volume),
        type: 'bar', name: 'Volume', yaxis: 'y2',
        marker: { color: oData.map(d => d.close_price >= d.open_price ? 'rgba(252,129,129,0.4)' : 'rgba(99,179,237,0.4)') },
        hovertemplate: '%{x}<br>Volume: %{y:,.0f}<extra></extra>',
      }], {
        ...darkLayout,
        title: { text: `${mainOhlcv} ${t.kauCandlestick}`, font: { color: '#63b3ed', size: 16 } },
        yaxis: { ...darkLayout.yaxis, title: t.priceUnit, domain: [0.3, 1] },
        yaxis2: { title: t.volumeUnit, gridcolor: '#2d3748', linecolor: '#2d3748', domain: [0, 0.25], anchor: 'x', font: { color: '#e0e0e0' } },
        xaxis: { ...darkLayout.xaxis, rangeslider: { visible: false } },
        height: 500,
        showlegend: false,
      }, plotlyConfig);
    } else {
      document.getElementById('kau-candlestick-chart').innerHTML = `<p style="text-align:center;padding:40px;color:#718096;">${t.noOhlc}</p>`;
    }
  } else {
    document.getElementById('kau-candlestick-chart').innerHTML = `<p style="text-align:center;padding:40px;color:#718096;">${t.noOhlc}</p>`;
  }

  // 3. Monthly KAU Volume & Amount (dual axis bar + line)
  if (rawMonthlyData.length > 0) {
    const mLabels = rawMonthlyData.map(d => `${d.year}-${String(d.month).padStart(2, '0')}`);
    const exchVol = rawMonthlyData.map(d => d.kau_exchange_vol / 10000);
    const exchAmt = rawMonthlyData.map(d => d.kau_exchange_amt / 100000000);

    Plotly.newPlot('monthly-volume-chart', [{
      x: mLabels, y: exchVol,
      type: 'bar', name: t.exchangeVol,
      marker: { color: 'rgba(99,179,237,0.6)' },
      hovertemplate: '%{x}<br>%{y:,.0f}<extra></extra>',
    }, {
      x: mLabels, y: exchAmt,
      type: 'scatter', mode: 'lines+markers',
      name: t.exchangeAmt, yaxis: 'y2',
      line: { color: '#48bb78', width: 2 },
      marker: { size: 4 },
      hovertemplate: '%{x}<br>%{y:,.0f}<extra></extra>',
    }], {
      ...darkLayout,
      title: { text: t.monthlyVolume, font: { color: '#63b3ed', size: 16 } },
      yaxis: { ...darkLayout.yaxis, title: t.volumeWan },
      yaxis2: { title: t.amountUnit, overlaying: 'y', side: 'right', gridcolor: '#2d3748', font: { color: '#e0e0e0' } },
      xaxis: { ...darkLayout.xaxis, type: 'category', tickangle: -45 },
      height: 450,
      legend: { bgcolor: 'rgba(26,35,50,0.8)', orientation: 'h', y: 1.12 },
      bargap: 0.3,
    }, plotlyConfig);
  }

  // 4. Monthly Heatmap
  if (rawMonthlyData.length > 0) {
    const heatYears = [...new Set(rawMonthlyData.map(d => String(d.year)))].sort();
    const months = Array.from({length: 12}, (_, i) => i + 1);
    const monthMap = {};
    rawMonthlyData.forEach(d => { monthMap[`${d.year}-${d.month}`] = d.kau_exchange_vol; });
    const zData = heatYears.map(y => months.map(m => {
      const v = monthMap[`${y}-${m}`];
      return v && v > 0 ? Math.round(v / 10000) : null;
    }));
    Plotly.newPlot('monthly-heatmap', [{
      z: zData, x: t.months, y: heatYears,
      type: 'heatmap', colorscale: 'YlOrRd', connectgaps: false,
      colorbar: { title: { text: t.volumeWan, side: 'right' }, tickfont: { color: '#e0e0e0' } },
      hovertemplate: '%{y} %{x}<br>%{z:,.0f}<extra></extra>',
      zmin: 0,
    }], {
      ...darkLayout,
      title: { text: t.monthlyHeatmap, font: { color: '#63b3ed', size: 16 } },
      xaxis: { ...darkLayout.xaxis, type: 'category' },
      yaxis: { ...darkLayout.yaxis, type: 'category', autorange: 'reversed' },
      height: 380,
    }, plotlyConfig);
  }

  // 5. Auction Results (scatter: award price + bar: award qty)
  if (rawAuctionData.length > 0) {
    const aLabels = rawAuctionData.map(d => `${d.auction_date} (${d.permit_type})`);
    Plotly.newPlot('auction-chart', [{
      x: aLabels,
      y: rawAuctionData.map(d => d.avg_award_price),
      type: 'scatter', mode: 'lines+markers',
      name: t.awardPrice,
      line: { color: '#ed8936', width: 2 },
      marker: { size: 6 },
      hovertemplate: '%{x}<br>₩%{y:,.0f}<extra></extra>',
    }, {
      x: aLabels,
      y: rawAuctionData.map(d => d.award_qty),
      type: 'bar', name: t.awardQty, yaxis: 'y2',
      marker: { color: 'rgba(99,179,237,0.5)' },
      hovertemplate: '%{x}<br>%{y:,.0f} tons<extra></extra>',
    }], {
      ...darkLayout,
      title: { text: t.auctionResults, font: { color: '#63b3ed', size: 16 } },
      yaxis: { ...darkLayout.yaxis, title: t.awardPrice },
      yaxis2: { title: t.awardQty, overlaying: 'y', side: 'right', gridcolor: '#2d3748', font: { color: '#e0e0e0' } },
      xaxis: { ...darkLayout.xaxis, type: 'category', tickangle: -60, tickfont: { size: 9 } },
      height: 450,
      legend: { bgcolor: 'rgba(26,35,50,0.8)', orientation: 'h', y: 1.12 },
      bargap: 0.4,
    }, plotlyConfig);
  }

  chartsInitialized = true;
}

// === Price Filter Bar ===
const pfState = {}; // { 'KAU15': true, ... }
const pfTraceMap = {}; // { 'KAU15': 0, ... }
const pfGroups = {}; // { 'KAU': [{type,index},...], ... }
const GROUP_COLORS = { KAU: '#63b3ed', KCU: '#9f7aea', KOC: '#f6e05e', 'i-KCU': '#b794f4', 'i-KOC': '#fbd38d' };
const GROUP_ORDER = ['KAU', 'KCU', 'KOC', 'i-KCU', 'i-KOC'];

function classifyGroup(tp) {
  if (tp.startsWith('i-KOC')) return 'i-KOC';
  if (tp.startsWith('i-KCU')) return 'i-KCU';
  if (tp.startsWith('KAU')) return 'KAU';
  if (tp.startsWith('KCU')) return 'KCU';
  if (tp.startsWith('KOC')) return 'KOC';
  return 'Other';
}

function getSuffix(tp, grp) {
  const prefix = grp === 'i-KOC' ? 'i-KOC' : grp === 'i-KCU' ? 'i-KCU' : grp;
  const s = tp.substring(prefix.length);
  return s || tp;
}

function applyPfVisibility() {
  const el = document.getElementById('kau-price-chart');
  if (!el || !el.data) return;
  const vis = el.data.map((_, i) => {
    const tp = Object.keys(pfTraceMap).find(k => pfTraceMap[k] === i);
    return tp && pfState[tp] ? true : 'legendonly';
  });
  Plotly.restyle('kau-price-chart', { visible: vis });
}

function updateGrpState() {
  GROUP_ORDER.forEach(grp => {
    const items = pfGroups[grp];
    if (!items) return;
    const btn = document.getElementById('pf-grp-' + grp);
    if (!btn) return;
    const onCount = items.filter(it => pfState[it.type]).length;
    btn.classList.remove('g-on', 'g-partial');
    if (onCount === items.length) btn.classList.add('g-on');
    else if (onCount > 0) btn.classList.add('g-partial');
  });
}

function updateTypeChips() {
  Object.keys(pfState).forEach(tp => {
    const chip = document.getElementById('pf-t-' + tp);
    if (chip) chip.classList.toggle('on', !!pfState[tp]);
  });
}

function pfSetAll(on) {
  Object.keys(pfState).forEach(tp => { pfState[tp] = on; });
  applyPfVisibility(); updateGrpState(); updateTypeChips();
}

function pfSetGroup(grp, on) {
  (pfGroups[grp] || []).forEach(it => { pfState[it.type] = on; });
  applyPfVisibility(); updateGrpState(); updateTypeChips();
}

function pfToggleType(tp) {
  pfState[tp] = !pfState[tp];
  applyPfVisibility(); updateGrpState(); updateTypeChips();
}

function pfReset(types) {
  types.forEach(tp => { pfState[tp] = true; });
  applyPfVisibility(); updateGrpState(); updateTypeChips();
  // collapse all expanded groups
  document.querySelectorAll('.pf-sub.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.pf-grp.expanded').forEach(el => el.classList.remove('expanded'));
}

function buildPriceFilter(types, t) {
  // Init state
  types.forEach((tp, i) => {
    pfState[tp] = true;
    pfTraceMap[tp] = i;
    const grp = classifyGroup(tp);
    if (!pfGroups[grp]) pfGroups[grp] = [];
    pfGroups[grp].push({ type: tp, index: i });
  });

  const bar = document.getElementById('price-filter-bar');
  bar.innerHTML = '';

  // Row 1: Controls + Group chips
  const row1 = document.createElement('div');
  row1.className = 'pf-row';

  // Control buttons
  const mkCtrl = (label, fn) => {
    const b = document.createElement('span');
    b.className = 'pf-btn pf-ctrl';
    b.textContent = label;
    b.onclick = fn;
    return b;
  };
  row1.appendChild(mkCtrl(t.filterAll, () => pfSetAll(true)));
  row1.appendChild(mkCtrl(t.filterNone, () => pfSetAll(false)));
  row1.appendChild(mkCtrl(t.filterReset, () => pfReset(types)));

  // Separator
  const sep = document.createElement('span');
  sep.className = 'pf-sep';
  row1.appendChild(sep);

  // Group chips
  GROUP_ORDER.forEach(grp => {
    if (!pfGroups[grp]) return;
    const cnt = pfGroups[grp].length;
    const b = document.createElement('span');
    b.className = 'pf-btn pf-grp g-on';
    b.id = 'pf-grp-' + grp;
    b.style.setProperty('--c', GROUP_COLORS[grp] || '#4a5568');
    b.innerHTML = `${grp}<span style="opacity:0.6;font-size:0.85em;margin:0 2px">${cnt}</span><span class="arrow">&#9656;</span>`;
    b.onclick = () => {
      const subDiv = document.getElementById('pf-sub-' + grp);
      if (subDiv) {
        subDiv.classList.toggle('open');
        b.classList.toggle('expanded');
      }
    };
    row1.appendChild(b);
  });

  bar.appendChild(row1);

  // Row 2+: Expandable sub-rows per group
  GROUP_ORDER.forEach(grp => {
    const items = pfGroups[grp];
    if (!items) return;
    const subDiv = document.createElement('div');
    subDiv.className = 'pf-sub';
    subDiv.id = 'pf-sub-' + grp;

    // Group all/none controls
    const allCtl = document.createElement('span');
    allCtl.className = 'pf-sub-ctl';
    allCtl.textContent = t.filterGrpAll;
    allCtl.onclick = () => pfSetGroup(grp, true);
    subDiv.appendChild(allCtl);

    const noneCtl = document.createElement('span');
    noneCtl.className = 'pf-sub-ctl';
    noneCtl.textContent = t.filterGrpNone;
    noneCtl.onclick = () => pfSetGroup(grp, false);
    subDiv.appendChild(noneCtl);

    const subSep = document.createElement('span');
    subSep.className = 'pf-sep';
    subDiv.appendChild(subSep);

    // Individual type chips (suffix only)
    items.forEach(it => {
      const chip = document.createElement('span');
      chip.className = 'pf-type on';
      chip.id = 'pf-t-' + it.type;
      chip.style.setProperty('--c', GROUP_COLORS[grp] || '#4a5568');
      chip.textContent = getSuffix(it.type, grp);
      chip.title = it.type;
      chip.onclick = () => pfToggleType(it.type);
      subDiv.appendChild(chip);
    });

    bar.appendChild(subDiv);
  });
}

function updateChartLabels(lang) {
  const t = i18n[lang];

  if (document.getElementById('kau-price-chart').data) {
    Plotly.relayout('kau-price-chart', {
      'title.text': t.kauPriceTrend,
      'yaxis.title.text': t.priceUnit,
    });
  }

  // Update filter bar labels for new language
  const ctrls = document.querySelectorAll('#price-filter-bar .pf-ctrl');
  if (ctrls.length >= 3) {
    ctrls[0].textContent = t.filterAll;
    ctrls[1].textContent = t.filterNone;
    ctrls[2].textContent = t.filterReset;
  }
  document.querySelectorAll('#price-filter-bar .pf-sub-ctl').forEach((el, i) => {
    el.textContent = i % 2 === 0 ? t.filterGrpAll : t.filterGrpNone;
  });

  const mainOhlcv = Object.keys(ohlcvByType).sort().filter(tp =>
    ohlcvByType[tp].some(d => d.open_price > 0)
  ).pop() || null;
  if (document.getElementById('kau-candlestick-chart').data) {
    Plotly.relayout('kau-candlestick-chart', {
      'title.text': `${mainOhlcv || 'KAU'} ${t.kauCandlestick}`,
      'yaxis.title': t.priceUnit,
      'yaxis2.title': t.volumeUnit,
    });
  }

  if (document.getElementById('monthly-volume-chart').data) {
    Plotly.relayout('monthly-volume-chart', {
      'title.text': t.monthlyVolume,
      'yaxis.title': t.volumeWan,
      'yaxis2.title': t.amountUnit,
    });
    Plotly.restyle('monthly-volume-chart', { name: t.exchangeVol }, [0]);
    Plotly.restyle('monthly-volume-chart', { name: t.exchangeAmt }, [1]);
  }

  if (document.getElementById('monthly-heatmap').data) {
    Plotly.relayout('monthly-heatmap', { 'title.text': t.monthlyHeatmap });
    Plotly.restyle('monthly-heatmap', { x: [t.months] }, [0]);
  }

  if (document.getElementById('auction-chart').data) {
    Plotly.relayout('auction-chart', {
      'title.text': t.auctionResults,
      'yaxis.title': t.awardPrice,
      'yaxis2.title': t.awardQty,
    });
  }
}

function renderCharts(lang) {
  if (!chartsInitialized) {
    initCharts(lang);
  } else {
    updateChartLabels(lang);
  }
}

function switchLang(lang) {
  currentLang = lang;
  const t = i18n[lang];
  document.getElementById('main-title').textContent = t.title;
  document.getElementById('sub-title').textContent = t.subtitle;
  document.getElementById('ds-title').textContent = t.dataSource;
  document.getElementById('ds-krx').textContent = t.krxSource;
  document.getElementById('ds-env').textContent = t.envSource;
  document.getElementById('ds-disclaimer').textContent = t.disclaimer;
  renderCards(lang);
  renderCharts(lang);
  try { localStorage.setItem('kets-dashboard-lang', lang); } catch(e) {}
}

let savedLang = 'ko';
try { savedLang = localStorage.getItem('kets-dashboard-lang') || 'ko'; } catch(e) {}
document.getElementById('lang-select').value = savedLang;
switchLang(savedLang);
</script>
